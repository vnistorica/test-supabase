## PostgREST baseline configuration.
##
## Runtime values (db-uri, anon-role, schemas, server-port) are supplied via
## PGRST_* environment variables in the Kubernetes deployment, which take
## precedence over this file. This file is baked into the image so the build is
## self-contained and does not rely on any external source at runtime.
db-schemas = "public"
server-port = 3000
